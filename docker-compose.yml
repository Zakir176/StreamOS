version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - ./backend/thumbnails:/app/thumbnails
      - ./backend/streamos.db:/app/streamos.db
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
    restart: always

  frontend:
    build: ./streamos-ui
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE=/api
    depends_on:
      - backend
    restart: always
